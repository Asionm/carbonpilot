<svg width="272" height="96" viewBox="0 0 272 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="carbonRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea55a"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2"
                    flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <radialGradient id="innerGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#dcfce7" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#dcfce7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#dcfce7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nodeGreen">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#10b981"/>
    </radialGradient>

    <linearGradient id="coreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(48 48)">
    <circle cx="0" cy="0" r="30" fill="url(#innerGlow)"/>
    <circle cx="0" cy="0" r="34"
            fill="none" stroke="url(#carbonRing)" stroke-width="7"
            stroke-linecap="round" filter="url(#softShadow)"/>

    <line x1="0" y1="0" x2="0" y2="-18" stroke="#d1d5db" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-15" y2="12" stroke="#d1d5db" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="15" y2="12" stroke="#d1d5db" stroke-width="2.6" stroke-linecap="round"/>

    <circle cx="0" cy="-18" r="4.8" fill="url(#nodeGreen)"/>
    <circle cx="-15" cy="12" r="4.8" fill="url(#nodeGreen)"/>
    <circle cx="15" cy="12" r="4.8" fill="url(#nodeGreen)"/>

    <polygon points="0,-16 16,-7 16,9 0,18 -16,9 -16,-7"
             fill="url(#coreGrad)"/>

    <circle cx="0" cy="4" r="4.2" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="4" r="1.9" fill="#10b981"/>
  </g>

  <!-- Text -->
  <text x="96" y="48"
        font-family="Inter, Arial, sans-serif"
        font-size="30"
        font-weight="700"
        letter-spacing="-0.6"
        dominant-baseline="middle"
        fill="#111827">
    CarbonPilot
  </text>
</svg>
